{% extends "base.html" %}
{% block title %}{{ a.title }} — TeamWorking by TechNexus{% endblock %}
{% set meta_description = a.meta_description %}
{% block content %}
<div class="wrap">
  <div style="margin-bottom:18px;"><a href="/blog">&larr; All insights</a></div>
  {% if a.thumbnail_url %}<img src="{{ a.thumbnail_url }}" alt="{{ a.title }}" style="width:100%;border-radius:12px;margin-bottom:24px;">{% endif %}
  <div class="prose">{{ a.body | safe }}</div>
  <div style="margin-top:40px;padding-top:24px;border-top:1px solid var(--rule);">
    <a href="/blog">&larr; Back to all insights</a>
  </div>
</div>
{% endblock %}
